{% extends 'base.html' %}

{% block title %}Application Form{% endblock %}

{% block content %}
{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}
<form action="" method="POST">
    {% csrf_token %}
    <div class="first-part">
        <div class="title">Անձնական տվյալներ</div>
        <label for="fname">Անուն</label>
        <input type="text" id="fname" name="fname">
        <label for="lname">Ազգանուն</label>
        <input type="text" id="lname" name="lname">
        <label for="faname">Հայրանուն</label>
        <input type="text" id="faname" name="faname">
        <label for="age">Տարիք</label>
        <input type="number" id="age" name="age">
        <label for="sex">Սեռ</label>
        <select name="sex" id="sex">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        <label for="family">Ընտանիքի անդամների թիվ</label>
        <input type="number" id="family" name="family">
        <label for="income">Ամսեկան եկամուտ</label>
        <input type="number" id="income" name="income">
        <label for="history">Վարկային պատմություն</label>
        <select name="history" id="history">
            <option value="1">Վատ</option>
            <option value="2">Ինֆորմացիա չկա</option>
            <option value="3">Միջին</option>
            <option value="4">Լավ</option>
            <option value="5">Գերազանց</option>
        </select>
    </div>
    <div class="second">
        <div class="title">Վարկի տվյալներ</div>
        <label for="type">Վարկի տեսակ</label>
        <select name="type" id="type">
            <option value="1">Հիփոթեքային վարկ</option>
            <option value="2">Ավտոմեքենայի ձեռք բերման վարկ</option>
            <option value="3">Սպառողական վարկ</option>
            <option value="4">Ոսկու գրավով վարկ</option>
            <option value="5">Ապառիկ վարկ</option>
            <option value="6">Տան վերանորոգման վարկ</option>
        </select>
        <label for="service">Սպասարկման ժամկետ</label>
        <select name="service" id="service">
            <option value="1">Մինչև 18 ամիս</option>
            <option value="2">19-24</option>
            <option value="3">25-60</option>
            <option value="4">61-120</option>
            <option value="5">121 և ավել</option>
        </select>
        <label for="worth">Գումար</label>
        <input type="number" id="worth" name="worth">
        <label for="mortgage">Գրավի տեսակ</label>
        <select name="mortgage" id="mortgage">
            <option value="1">Առանց գրավի առկայության</option>
            <option value="2">Մեքենայի գրավով</option>
            <option value="3">Անշարժ գույքի գրավով</option>
        </select>
    </div>
    <input type="submit" value="Submit" class="button">
</form>
<div class="first">
    <a href="{% url 'accepted_applications' %}" class="button">Բավարարված հայտեր</a>
    <a href="{% url 'rejected_applications' %}" class="button">Մերժված հայտեր</a>
</div>
{% endblock %}
